# Squawk — migration linter for internal/saas/store/migrations/*.sql.
# Decided alongside goose; see docs/saas-schema-migration-draft.md §决策摘要 / D6.
#
# Squawk lints INCREMENTAL migrations (00002+) on a populated production table.
# The baseline is exempt:

# 00001_baseline.sql builds every table from an empty database, so Squawk's
# populated-table rules (require-*-timeout, prefer-robust-stmts/IF NOT EXISTS,
# ban-char-field on the existing varchar columns, …) are all false positives
# there. It is the frozen, hand-curated dump whose fidelity is guaranteed by
# migrate_drift_test.go, not by Squawk. Incremental migrations get the full
# rule set.
excluded_paths = ["*_baseline.sql"]

# goose wraps each migration file in a transaction (unless it declares
# `-- +goose NO TRANSACTION`), so Squawk should reason about statements as
# running inside one. This relaxes rules that are only unsafe outside a txn.
assume_in_transaction = true

# The two concurrent-index rules are structurally unsatisfiable under our
# migration model: CREATE/DROP INDEX CONCURRENTLY cannot run inside a
# transaction, but goose wraps every migration in one (assume_in_transaction
# above). Squawk v2.56.0 still suggests CONCURRENTLY regardless, so the rules
# can never go green for any index migration here — excluding files would just
# grow without bound. Single-user lab DB with tiny tables: a plain CREATE INDEX
# briefly blocking writes is acceptable. require-timeout-settings is kept (it
# IS satisfiable in-txn — migrations set lock/statement timeouts explicitly).
excluded_rules = [
    "require-concurrent-index-creation",
    "require-concurrent-index-deletion",
]

# Minimum supported Postgres for prod (TimescaleDB pg17). Lets version-gated
# rules (e.g. safe non-CONCURRENTLY operations on newer PG) judge correctly.
pg_version = "17.0"
