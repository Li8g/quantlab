# QuantLab runtime configuration example. Copy to config.yaml and fill in
# secrets before starting the SaaS binary.
#
# AppRole drives behavior splits (see docs/系统总体拓扑结构.md §2):
#   saas — production
#   lab  — offline backtest, no WS Hub, no Cron
#   dev  — local development
app_role: dev

database:
  host: localhost
  port: 5432
  user: quantlab
  password: change-me-in-real-deploy
  database: quantlab
  ssl_mode: disable
  max_open_conns: 50
  max_idle_conns: 10
  # migration_mode selects the schema backend, independent of app_role:
  #   goose       — versioned migrations (production-faithful schema)
  #   automigrate — GORM AutoMigrate + raw DDL (dev fast-iteration)
  #   (unset)     — derive from app_role: saas→goose, lab/dev→automigrate
  # Set this to `goose` on a lab/backtest cluster or paper-trading node to
  # run the prod schema without app_role=saas's other behaviors. app_role=saas
  # may not set automigrate (prod schema is goose-owned).
  migration_mode: ""

jwt:
  # MUST be >= 32 bytes when app_role=saas (HS256 / RFC 7518).
  # Generate with: openssl rand -hex 32
  secret: change-me-to-a-random-string-of-at-least-32-bytes
  # ttl bounds viewer + operator JWT lifetime (default 24h).
  ttl: 24h
  # admin_ttl bounds the sudo-style elevated session (default 10min).
  # Shorter = smaller fat-finger window for /promote, /retire,
  # instance writes, etc. Re-login is the way to extend.
  admin_ttl: 10m

server:
  http_listen: ":8080"
  ws_listen: ":8081"
  metrics_listen: ":9090"
  shutdown_timeout: 30s

# Default friction values used when a CreateEvolutionTaskRequest does not
# override them. Per coding plan §I-3.11.
friction:
  taker_fee_bps: 10
  slippage_bps: 5

# Engine-wide GA defaults; per-task overrides via API request body.
ga:
  pop_size: 200
  max_generations: 30
  elite_ratio: 0.05
  fatal_mdd: 0.70
  oos_days: 60
  fatal_audit_sample_rate: 0.05
  sbb_block_len_fallback: 12

# Live-trading auto-freeze (kill_switch Option 3). The agent is halted when a
# managed asset's reconciliation drift stays above freeze_tolerance_bps for
# freeze_debounce_reports consecutive 60s delta_reports. These are deliberately
# tunable, not hard-coded: the right freeze line is coupled to trade speed — a
# faster strategy has more in-flight fills per window, so its *normal* transient
# drift is larger and the line must sit above it. Tune from the observed
# `delta_report_reconcile_summary` logs (max_managed_drift_bps vs window_fills).
# Omit the section (or set 0) to use defaults: 200 bps / 2 reports.
reconcile:
  freeze_tolerance_bps: 200
  freeze_debounce_reports: 2

# Datafeeder defaults (Phase 1.5).
data_feed:
  binance_archive_base_url: https://data.binance.vision
  binance_api_base_url: https://api.binance.com
  api_rate_interval: 150ms
  default_symbol: BTCUSDT
  default_interval: 1m
  # max_bar_staleness: if the newest trailing 1m kline is older than this at
  # Tick time, the live-trading manager skips that cycle (no order dispatch)
  # and logs scheduler_tick_skipped_stale_data — pricing orders off a stale
  # close would be rejected by the exchange and auto-frozen by the reconciler.
  # Set above your datafeeder import cadence + margin. Omit/0 → 15m default.
  max_bar_staleness: 15m

# Live-trading order execution (B2 price protection). The dispatcher rewrites
# every market intent as a marketable LIMIT IOC priced at latestClose×(1±cap),
# so a flash fill worse than the cap is rejected by the exchange instead of
# executing at a runaway price (IOC ⇒ no resting order, no locked balance).
# This is a human-held execution guardrail — it never enters the GA or the
# backtest. Invariant: cap ≥ the deployed champion's effective slippage_bps
# (enforced at deploy-champion), so the backtest's normal fill price is never
# itself rejected live; the limit is then numerically identical to the market
# fill it replaces (no fitness_version event). Omit the section → 50bps default
# (protection on). Set price_cap_bps: 0 to disable (market passthrough).
# See docs/decision-b2-limit-order-price-protection.md.
orders:
  price_cap_bps: 50

# Live-trading fleet boundary.
live:
  # expected_environment: the trading environment this deployment's agents must
  # be on (mainnet/testnet/mock), asserted at the WS handshake against the
  # agent's reported environment (backlog ⑥, catches a misconfigured agent
  # before it trades). On app_role=saas a mismatch is a hard auth_fail; on
  # dev/lab it only warns (so the intended testnet workflow — mainnet klines +
  # testnet agent — keeps running). Omit/empty → assertion disabled.
  expected_environment: ""
