# optuna_ga_meta runtime configuration example. Copy to config.metaopt.yaml
# and fill in secrets before running.
#
# This config is consumed only by the research/optuna_ga_meta/ scripts — it is
# NOT the main QuantLab server config (config.yaml). It points at:
#   - the QuantLab Postgres instance (read-only: pulls challenger scores)
#   - the meta-lab Postgres instance (read/write: Optuna studies + meta results)
#   - the running QuantLab SaaS HTTP API (to submit GA tasks and read results)
#
# app_role must match the target QuantLab deployment (dev/lab/saas).
app_role: dev

# QuantLab main database (read-only access used by setup_meta_lab.py to
# snapshot champion scores and bar hashes for the meta-optimizer).
database:
  host: 127.0.0.1
  port: 5433
  user: quantlab
  password: change-me-in-real-deploy
  database: quantlab_meta
  ssl_mode: disable
  max_open_conns: 50
  max_idle_conns: 10

# JWT secret must match the running QuantLab SaaS server so that
# optuna_ga_meta.py can call /auth/login and then POST /evolution/tasks.
# Generate with: openssl rand -hex 32
jwt:
  secret: change-me-to-a-random-string-of-at-least-32-bytes
  ttl: 24h

server:
  http_listen: ":8090"
  ws_listen: ":8091"
  metrics_listen: ":9092"
  shutdown_timeout: 30s

friction:
  taker_fee_bps: 10
  slippage_bps: 5

ga:
  pop_size: 200
  max_generations: 30
  elite_ratio: 0.05
  fatal_mdd: 0.70
  oos_days: 60
  fatal_audit_sample_rate: 0.05
  sbb_block_len_fallback: 12

data_feed:
  binance_archive_base_url: https://data.binance.vision
  binance_api_base_url: https://api.binance.com
  api_rate_interval: 150ms
  default_symbol: BTCUSDT
  default_interval: 1m
